grumphp:
    parallel:
        enabled: true
        max_workers: 32
    tasks:
        phpstan:
            configuration: phpstan.dist.neon
            use_grumphp_paths: true
            triggered_by: [ 'php' ]
            ignore_patterns:
                - 'tests/bootstrap.php'
        phpcsfixer:
            config: ".php-cs-fixer.dist.php"
            verbose: true
            diff: false
            triggered_by: ["php"]
        twigcsfixer:
            #paths: [ ]
            #level: ~
            config: ".twig-cs-fixer.dist.php"
            report: 'text'
            #no-cache: false
            #verbose: false
        yamllint:
            whitelist_patterns: []
            ignore_patterns: []
            object_support: false
            exception_on_invalid_type: false
            parse_constant: false
            parse_custom_tags: false
        xmllint:
            ignore_patterns: [ ]
            load_from_net: false
            x_include: false
            dtd_validation: false
            scheme_validation: false
            triggered_by: [ 'xml' ]

